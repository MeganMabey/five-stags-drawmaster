<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#09110c">
  <title>Five Stags Raffle Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <div id="game-container" aria-label="Five Stags Meat Raffle"></div>

    <section class="top-controls">
      <button id="sound-btn" type="button">Sound: On</button>
      <button id="settings-btn" type="button">Settings</button>
      <button id="fullscreen-btn" type="button">Full screen</button>
    </section>

    <section class="bottom-controls">
      <div class="stat-box">
        <span>Remaining</span>
        <strong id="remaining-value">200</strong>
      </div>

      <button id="draw-btn" class="draw-button" type="button">
        <strong>DRAW A NUMBER</strong>
        <span>Start the raffle drum</span>
      </button>

      <div class="stat-box">
        <span>Drawn</span>
        <strong id="drawn-value">0</strong>
      </div>

      <button id="reset-btn" class="reset-button" type="button">Reset</button>
    </section>

    <section class="history-bar">
      <strong>PREVIOUS WINNERS</strong>
      <div id="history-list">No winners yet.</div>
    </section>
  </main>

  <aside id="settings-panel" class="settings-panel" aria-hidden="true">
    <div id="settings-backdrop" class="settings-backdrop"></div>
    <div class="settings-card">
      <button id="close-settings" class="close-settings" type="button">×</button>
      <h2>Raffle settings</h2>

      <label for="highest-ticket">Highest ticket number</label>
      <div class="field-row">
        <input id="highest-ticket" type="number" min="1" max="2000" value="200">
        <button id="apply-settings" type="button">Apply</button>
      </div>

      <p id="settings-message">Tickets 1–200 are loaded.</p>

      <label class="toggle-row">
        <span>Three-second countdown</span>
        <input id="countdown-toggle" type="checkbox" checked>
      </label>

      <label class="toggle-row">
        <span>Large winner celebration</span>
        <input id="celebration-toggle" type="checkbox" checked>
      </label>
    </div>
  </aside>

  <div id="countdown-overlay" class="countdown-overlay" aria-hidden="true">
    <strong id="countdown-value">3</strong>
  </div>

  <div id="winner-overlay" class="winner-overlay" aria-hidden="true">
    <div id="confetti-layer" class="confetti-layer"></div>
    <section class="winner-card">
      <span>WINNING TICKET</span>
      <strong id="winner-value">—</strong>
      <p>Congratulations!</p>
      <button id="close-winner" type="button">Back to raffle</button>
    </section>
  </div>

  <dialog id="reset-dialog">
    <form method="dialog">
      <h2>Reset the raffle?</h2>
      <p>This clears all previous winners.</p>
      <div>
        <button value="cancel">Cancel</button>
        <button value="confirm" class="danger">Reset</button>
      </div>
    </form>
  </dialog>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/4.2.1/phaser.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
